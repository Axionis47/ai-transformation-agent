name: Deploy to Cloud Run

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Run tests
        run: python -m pytest tests/ -q --tb=short

  deploy:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for WIF OIDC token exchange
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/359145045403/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'ai-transform-agent@plotpointe.iam.gserviceaccount.com'

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ai-transform-agent \
            --source=. \
            --region=us-central1 \
            --service-account=ai-transform-agent@plotpointe.iam.gserviceaccount.com \
            --allow-unauthenticated \
            --set-env-vars="GCP_PROJECT_ID=plotpointe,GCP_LOCATION=us-central1" \
            --memory=1Gi \
            --timeout=300 \
            --quiet

      - name: Verify deployment
        run: |
          URL=$(gcloud run services describe ai-transform-agent --region=us-central1 --format='value(status.url)')
          curl -sf "${URL}/health" || exit 1
          echo "Deployment verified: ${URL}"
