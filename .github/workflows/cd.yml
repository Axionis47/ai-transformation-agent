name: CD — Deploy to Cloud Run

on:
  workflow_run:
    workflows: ["CI — Tests & Eval Gate"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build and push Docker image
        run: |
          gcloud builds submit \
            --tag gcr.io/${{ secrets.GCP_PROJECT_ID }}/ai-transform-agent:latest \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --quiet

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ai-transform-agent \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/ai-transform-agent:latest \
            --region us-central1 \
            --memory 2Gi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 3 \
            --allow-unauthenticated \
            --set-env-vars "MODEL_PROVIDER=vertex,GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }},GCP_LOCATION=us-central1,VERTEX_MODEL=gemini-2.5-pro,VERTEX_FAST_MODEL=gemini-2.5-flash,SERVICE_VERSION=sprint7" \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --quiet

      - name: Smoke test
        run: |
          URL=$(gcloud run services describe ai-transform-agent \
            --region us-central1 \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --format 'value(status.url)')
          echo "Deploy URL: $URL"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/health")
          if [ "$STATUS" != "200" ]; then
            echo "Smoke test FAILED — /health returned $STATUS"
            exit 1
          fi
          echo "Smoke test PASSED — /health returned 200"
